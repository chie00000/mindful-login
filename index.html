<!DOCTYPE html>
<html lang="ja">
<head>
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Mindful Login" />
  <meta name="theme-color" content="#0f172a" />
  <title>Mindful Login</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      min-height: 100vh;
      min-height: -webkit-fill-available;
      background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f2027 100%);
      font-family: 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', 'Noto Sans JP', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: fixed;
      width: 100%;
    }

    .bg-circle1 {
      position: fixed; width: 400px; height: 400px; border-radius: 50%;
      background: radial-gradient(circle, rgba(99,102,241,0.15) 0%, transparent 70%);
      top: -100px; right: -100px; pointer-events: none;
    }
    .bg-circle2 {
      position: fixed; width: 300px; height: 300px; border-radius: 50%;
      background: radial-gradient(circle, rgba(52,211,153,0.1) 0%, transparent 70%);
      bottom: -80px; left: -80px; pointer-events: none;
    }

    #app {
      width: 100%;
      max-width: 420px;
      height: 100vh;
      height: -webkit-fill-available;
      display: flex;
      flex-direction: column;
      padding: 16px;
      padding-top: max(16px, env(safe-area-inset-top));
      padding-bottom: max(16px, env(safe-area-inset-bottom));
    }

    .card {
      background: rgba(15, 23, 42, 0.88);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(99,102,241,0.3);
      border-radius: 24px;
      padding: 28px 22px;
      box-shadow: 0 25px 60px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05);
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .screen { display: flex; flex-direction: column; flex: 1; gap: 11px; overflow: hidden; }

    /* typography */
    .header-label {
      font-size: 10px; letter-spacing: 0.2em;
      color: rgba(99,102,241,0.8); text-transform: uppercase; text-align: center;
    }
    .big-title {
      font-size: 34px; font-weight: 900; text-align: center; line-height: 1.1;
      color: #e2e8f0; letter-spacing: 0.05em;
      text-shadow: 0 0 40px rgba(99,102,241,0.4);
    }
    .section-title {
      font-size: 17px; font-weight: 700; color: #e2e8f0;
      text-align: center; letter-spacing: 0.03em;
    }
    .sub-text { text-align: center; font-size: 12px; color: rgba(148,163,184,0.6); }

    /* level box */
    .level-box {
      background: rgba(99,102,241,0.1);
      border: 1px solid rgba(99,102,241,0.2);
      border-radius: 12px; padding: 12px 16px;
    }
    .level-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .level-badge {
      background: rgba(99,102,241,0.3); color: #a5b4fc;
      font-size: 11px; font-weight: 700; padding: 2px 8px;
      border-radius: 20px; letter-spacing: 0.05em;
    }
    .level-title { color: #e2e8f0; font-size: 14px; font-weight: 600; flex: 1; }
    .xp-text { color: #a5b4fc; font-size: 12px; font-weight: 700; }
    .progress-bar { height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, #6366f1, #a78bfa); border-radius: 3px; transition: width 0.8s ease; }

    /* streak */
    .streak-badge {
      text-align: center; font-size: 13px; color: #fbbf24;
      background: rgba(251,191,36,0.1); border: 1px solid rgba(251,191,36,0.2);
      border-radius: 20px; padding: 6px 16px;
    }
    .streak-small { text-align: center; color: #fbbf24; font-size: 13px; opacity: 0.8; }

    /* login button */
    .login-btn {
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      color: #fff; border: none; border-radius: 16px;
      padding: 18px 24px; font-size: 18px; font-weight: 700;
      cursor: pointer; display: flex; align-items: center;
      justify-content: center; gap: 10px; letter-spacing: 0.05em;
      box-shadow: 0 8px 30px rgba(79,70,229,0.4);
      transition: transform 0.1s, box-shadow 0.1s;
      font-family: inherit; width: 100%;
    }
    .login-btn:active { transform: scale(0.96); box-shadow: 0 4px 15px rgba(79,70,229,0.3); }
    .login-btn.stamping { opacity: 0.8; transform: scale(0.96); }
    .login-hint { text-align: center; font-size: 11px; color: rgba(148,163,184,0.5); letter-spacing: 0.05em; }

    /* history btn */
    .history-btn {
      background: transparent; border: 1px solid rgba(148,163,184,0.2);
      color: rgba(148,163,184,0.7); border-radius: 10px;
      padding: 8px 16px; font-size: 13px; cursor: pointer;
      margin-top: auto; font-family: inherit;
    }

    /* bonus flash */
    .bonus-flash {
      text-align: center; font-size: 22px; font-weight: 800;
      color: #fbbf24; text-shadow: 0 0 20px rgba(251,191,36,0.6);
      letter-spacing: 0.05em; padding: 6px 0;
    }

    /* situation tag */
    .situation-tag {
      text-align: center; color: #a5b4fc; font-size: 13px;
      background: rgba(99,102,241,0.1); border-radius: 8px;
      padding: 6px 12px; letter-spacing: 0.02em;
    }

    /* list */
    .list-grid { display: flex; flex-direction: column; gap: 6px; overflow-y: auto; flex: 1; }
    .list-item {
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px; color: #cbd5e1; padding: 12px 16px;
      font-size: 14px; text-align: left; cursor: pointer;
      transition: background 0.15s; font-family: inherit; width: 100%;
    }
    .list-item:active { background: rgba(255,255,255,0.1); }

    /* coping categories */
    .coping-scroll { overflow-y: auto; flex: 1; padding-bottom: 8px; }
    .cat-block { margin-bottom: 6px; }
    .cat-header {
      width: 100%; background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px; color: #e2e8f0;
      padding: 12px 14px; font-size: 14px; font-weight: 600;
      text-align: left; cursor: pointer;
      display: flex; justify-content: space-between; align-items: center;
      font-family: inherit;
    }
    .cat-items { display: flex; flex-wrap: wrap; gap: 6px; padding: 8px 4px; }
    .coping-item {
      background: rgba(255,255,255,0.05); border: 1px solid;
      border-radius: 20px; color: #cbd5e1; padding: 7px 14px;
      font-size: 13px; cursor: pointer; transition: background 0.15s;
      font-family: inherit;
    }
    .coping-item:active { background: rgba(255,255,255,0.15); }

    /* outcome */
    .outcome-grid { display: flex; flex-direction: column; gap: 10px; flex: 1; justify-content: center; }
    .outcome-btn {
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px; color: #e2e8f0; padding: 18px 20px;
      cursor: pointer; display: flex; align-items: center; gap: 12px;
      font-family: inherit; transition: background 0.15s;
    }
    .outcome-btn:active { background: rgba(255,255,255,0.12); }
    .outcome-emoji { font-size: 28px; }
    .outcome-label { flex: 1; font-size: 15px; font-weight: 600; text-align: left; }
    .outcome-xp { color: #fbbf24; font-weight: 700; font-size: 14px; }

    /* result */
    .result-emoji { text-align: center; font-size: 56px; }
    .result-title { text-align: center; font-size: 20px; font-weight: 800; color: #e2e8f0; }
    .xp-earned {
      text-align: center; font-size: 28px; font-weight: 900;
      color: #fbbf24; text-shadow: 0 0 20px rgba(251,191,36,0.5);
      letter-spacing: 0.05em;
    }
    .result-box {
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px; padding: 14px 16px;
      display: flex; flex-direction: column; gap: 8px;
    }
    .result-row { display: flex; gap: 12px; font-size: 13px; color: #cbd5e1; flex-wrap: wrap; }
    .result-row span:first-child { opacity: 0.6; white-space: nowrap; }

    /* buttons */
    .home-btn {
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      color: #fff; border: none; border-radius: 12px;
      padding: 14px; font-size: 16px; font-weight: 700;
      cursor: pointer; margin-top: auto; font-family: inherit; width: 100%;
    }
    .back-btn {
      background: transparent; border: none; color: #a5b4fc;
      font-size: 14px; cursor: pointer; padding: 4px 0;
      text-align: left; font-family: inherit;
    }

    /* history */
    .history-scroll { overflow-y: auto; flex: 1; }
    .log-item {
      background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06);
      border-radius: 10px; padding: 12px 14px; margin-bottom: 8px;
    }
    .log-top { display: flex; justify-content: space-between; margin-bottom: 4px; }
    .log-date { font-size: 11px; color: rgba(148,163,184,0.6); }
    .log-xp { font-size: 12px; color: #fbbf24; font-weight: 700; }
    .log-sit { font-size: 12px; color: #94a3b8; margin-bottom: 2px; }
    .log-coping { font-size: 14px; color: #a5b4fc; font-weight: 600; }
    .log-outcome { font-size: 11px; opacity: 0.6; color: #cbd5e1; margin-top: 2px; }

    .spacer { flex: 1; }
    .hidden { display: none !important; }
  </style>
</head>
<body>
<div class="bg-circle1"></div>
<div class="bg-circle2"></div>

<div id="app">
  <div class="card">

    <!-- HOME -->
    <div id="screen-home" class="screen">
      <div class="header-label">意識の中心へ</div>
      <div class="big-title">MINDFUL<br>LOGIN</div>
      <div class="level-box">
        <div class="level-row">
          <span class="level-badge" id="home-lv">Lv.1</span>
          <span class="level-title" id="home-lv-title">目覚め前夜</span>
          <span class="xp-text" id="home-xp">0 XP</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" id="home-progress" style="width:0%"></div></div>
      </div>
      <div class="streak-badge hidden" id="home-streak"></div>
      <button class="login-btn" id="btn-login">
        <span style="font-size:22px">⬡</span>
        <span>意識をログイン</span>
      </button>
      <div class="login-hint">スマホを見ようとした瞬間に押す</div>
      <button class="history-btn hidden" id="btn-history">📜 記録 <span id="log-count">0</span>件</button>
    </div>

    <!-- SITUATION -->
    <div id="screen-situation" class="screen hidden">
      <div class="bonus-flash" id="sit-bonus"></div>
      <div class="streak-small hidden" id="sit-streak"></div>
      <div class="section-title">今、何をしようとしていた？</div>
      <div class="sub-text">正直に選んでね</div>
      <div class="list-grid" id="sit-list"></div>
    </div>

    <!-- COPING -->
    <div id="screen-coping" class="screen hidden">
      <div class="situation-tag" id="cop-sit-tag"></div>
      <div class="section-title">代わりに何をする？</div>
      <div class="coping-scroll" id="cop-list"></div>
    </div>

    <!-- OUTCOME -->
    <div id="screen-outcome" class="screen hidden">
      <div class="section-title" id="out-coping-label"></div>
      <div class="sub-text">やってみてどうだった？</div>
      <div class="outcome-grid" id="out-list"></div>
    </div>

    <!-- RESULT -->
    <div id="screen-result" class="screen hidden">
      <div class="result-emoji" id="res-emoji"></div>
      <div class="result-title" id="res-title"></div>
      <div class="xp-earned" id="res-xp"></div>
      <div class="result-box">
        <div class="result-row"><span>状況</span><span id="res-sit"></span></div>
        <div class="result-row"><span>代替行動</span><span id="res-cop"></span></div>
      </div>
      <div class="level-box">
        <div class="level-row">
          <span class="level-badge" id="res-lv">Lv.1</span>
          <span class="level-title" id="res-lv-title">目覚め前夜</span>
          <span class="xp-text" id="res-xp-total">0 XP</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" id="res-progress" style="width:0%"></div></div>
      </div>
      <button class="home-btn" id="btn-res-home">ホームへ戻る</button>
    </div>

    <!-- HISTORY -->
    <div id="screen-history" class="screen hidden">
      <div class="section-title">ログ履歴</div>
      <button class="back-btn" id="btn-hist-back">← 戻る</button>
      <div class="history-scroll" id="hist-list"></div>
    </div>

  </div>
</div>

<script>
// ─── データ ───────────────────────────────────────────────────
const COPING_CATEGORIES = [
  { id:"mood_up", label:"気分を上げたい", emoji:"✨", color:"#c084fc",
    items:["カラコンする","メイクバッチリする","服を買う","美容院行く","ネイルつやつやにする","精油の香りをまとう","速いテンポの曲を聴く","ストレートアイロンかける","カフェで手帳","RUN/ウォーキングに行く"] },
  { id:"body", label:"体調・肩コリ対策", emoji:"🌿", color:"#34d399",
    items:["ヨガする","水分摂取する","FIT BOXINGする","あたたかい飲み物準備する","寝て休む・仮眠をとる","瞑想をする","お風呂に入る","ストレッチする","アイマスクをする","スマホをタイムロックする"] },
  { id:"stress", label:"イライラ・現実逃避したい時", emoji:"🌊", color:"#60a5fa",
    items:["一つ決めて行動開始する","Vyond着手","放大受講","手帳を開く","断捨離する","メダカを眺める・水替え","多肉を眺める・植え替え","ネイルケアする","モモを読む","Apple Watchのマインドフルネスを押す"] },
  { id:"cleaning", label:"掃除・片付け", emoji:"🧹", color:"#fbbf24",
    items:["トイレ","洗面","キッチン","食器棚","食品庫","フロ","クローゼット","文具入れ","カーテン洗う","布団干す","シーツ洗う","リビング床","玄関"] },
  { id:"change", label:"気分を変えたい", emoji:"🌈", color:"#f87171",
    items:["ヒトカラ行く","ショッピングセンターに行く","スイーツを買う","図書館行く","映画鑑賞"] },
];

const SITUATIONS = [
  "SNSを開こうとしていた","ネットニュースを眺めようとしていた",
  "YouTubeを流し見しようとしていた","なんとなくスマホを手に取った",
  "手持ち無沙汰でスマホを見ていた","TikTokを見ようとしていた","その他",
];

const OUTCOMES = [
  { label:"代替行動できた！", xp:50, emoji:"🏆" },
  { label:"半分できた", xp:25, emoji:"⚡" },
  { label:"できなかったけど気づけた", xp:10, emoji:"🌱" },
];

const LEVELS = [
  { min:0,    max:99,       level:1, title:"目覚め前夜" },
  { min:100,  max:299,      level:2, title:"気づきの芽" },
  { min:300,  max:599,      level:3, title:"静けさの使い手" },
  { min:600,  max:999,      level:4, title:"意識の守り人" },
  { min:1000, max:1999,     level:5, title:"今ここの達人" },
  { min:2000, max:Infinity, level:6, title:"意識の主" },
];

// ─── ストレージ ───────────────────────────────────────────────
const KEY = "mindful_login_v1";
function load() {
  try { const r = localStorage.getItem(KEY); return r ? JSON.parse(r) : {logs:[],totalXP:0,streak:0,lastDate:null}; }
  catch { return {logs:[],totalXP:0,streak:0,lastDate:null}; }
}
function save(d) { try { localStorage.setItem(KEY, JSON.stringify(d)); } catch {} }

// ─── ユーティリティ ───────────────────────────────────────────
function getLevel(xp) { return LEVELS.find(l => xp >= l.min && xp <= l.max) || LEVELS[0]; }
function progress(xp) {
  const l = getLevel(xp);
  if (l.max === Infinity) return 99;
  return Math.min(100, ((xp - l.min) / (l.max - l.min + 1)) * 100);
}
function todayStr() { return new Date().toISOString().slice(0,10); }
function fmtDate(iso) {
  const d = new Date(iso);
  return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

// ─── 状態 ────────────────────────────────────────────────────
let state = load();
let session = {};
let openCat = null;

// ─── 画面切替 ────────────────────────────────────────────────
const screens = ['home','situation','coping','outcome','result','history'];
function show(name) {
  screens.forEach(s => {
    document.getElementById('screen-'+s).classList.toggle('hidden', s !== name);
  });
}

// ─── HOME ────────────────────────────────────────────────────
function renderHome() {
  const lv = getLevel(state.totalXP);
  const pct = progress(state.totalXP);
  document.getElementById('home-lv').textContent = 'Lv.'+lv.level;
  document.getElementById('home-lv-title').textContent = lv.title;
  document.getElementById('home-xp').textContent = state.totalXP+' XP';
  document.getElementById('home-progress').style.width = pct+'%';

  const streakEl = document.getElementById('home-streak');
  if (state.streak > 0) {
    streakEl.textContent = '🔥 '+state.streak+'日連続ログイン中';
    streakEl.classList.remove('hidden');
  } else { streakEl.classList.add('hidden'); }

  const histBtn = document.getElementById('btn-history');
  const logCount = document.getElementById('log-count');
  if (state.logs.length > 0) {
    histBtn.classList.remove('hidden');
    logCount.textContent = state.logs.length;
  } else { histBtn.classList.add('hidden'); }

  show('home');
}

document.getElementById('btn-login').addEventListener('click', () => {
  const btn = document.getElementById('btn-login');
  btn.classList.add('stamping');
  btn.disabled = true;
  btn.innerHTML = '<span>✦ ログイン中... ✦</span>';

  setTimeout(() => {
    btn.classList.remove('stamping');
    btn.disabled = false;
    btn.innerHTML = '<span style="font-size:22px">⬡</span><span>意識をログイン</span>';

    const now = new Date().toISOString();
    const today = todayStr();
    const yesterday = new Date(Date.now()-86400000).toISOString().slice(0,10);
    const bonusXP = state.lastDate === today ? 5 : 20;
    const newStreak = state.lastDate === yesterday ? state.streak+1
                    : state.lastDate === today ? state.streak : 1;

    session = { loginAt: now, bonusXP, streak: newStreak };
    state.totalXP += bonusXP;
    state.streak = newStreak;
    state.lastDate = today;
    save(state);

    renderSituation();
  }, 1000);
});

document.getElementById('btn-history').addEventListener('click', renderHistory);

// ─── SITUATION ───────────────────────────────────────────────
function renderSituation() {
  document.getElementById('sit-bonus').textContent = '+'+session.bonusXP+' XP ログインボーナス！';
  const streakEl = document.getElementById('sit-streak');
  if (session.streak > 1) {
    streakEl.textContent = '🔥 '+session.streak+'日連続！';
    streakEl.classList.remove('hidden');
  } else { streakEl.classList.add('hidden'); }

  const list = document.getElementById('sit-list');
  list.innerHTML = '';
  SITUATIONS.forEach(s => {
    const btn = document.createElement('button');
    btn.className = 'list-item';
    btn.textContent = s;
    btn.addEventListener('click', () => { session.situation = s; renderCoping(); });
    list.appendChild(btn);
  });
  show('situation');
}

// ─── COPING ──────────────────────────────────────────────────
function renderCoping() {
  document.getElementById('cop-sit-tag').textContent = '「'+session.situation+'」';
  const list = document.getElementById('cop-list');
  list.innerHTML = '';
  openCat = null;

  COPING_CATEGORIES.forEach(cat => {
    const block = document.createElement('div');
    block.className = 'cat-block';

    const header = document.createElement('button');
    header.className = 'cat-header';
    header.style.borderLeft = '4px solid '+cat.color;
    header.innerHTML = '<span>'+cat.emoji+' '+cat.label+'</span><span style="opacity:0.6;font-size:12px">▼</span>';

    const items = document.createElement('div');
    items.className = 'cat-items hidden';

    cat.items.forEach(item => {
      const btn = document.createElement('button');
      btn.className = 'coping-item';
      btn.style.borderColor = cat.color+'66';
      btn.textContent = item;
      btn.addEventListener('click', () => {
        session.copingCat = cat.label;
        session.copingItem = item;
        renderOutcome();
      });
      items.appendChild(btn);
    });

    header.addEventListener('click', () => {
      const isOpen = !items.classList.contains('hidden');
      // 全部閉じる
      list.querySelectorAll('.cat-items').forEach(el => el.classList.add('hidden'));
      list.querySelectorAll('.cat-header span:last-child').forEach(el => el.textContent = '▼');
      if (!isOpen) {
        items.classList.remove('hidden');
        header.querySelector('span:last-child').textContent = '▲';
      }
    });

    block.appendChild(header);
    block.appendChild(items);
    list.appendChild(block);
  });
  show('coping');
}

// ─── OUTCOME ─────────────────────────────────────────────────
function renderOutcome() {
  document.getElementById('out-coping-label').textContent = '「'+session.copingItem+'」';
  const list = document.getElementById('out-list');
  list.innerHTML = '';
  OUTCOMES.forEach(o => {
    const btn = document.createElement('button');
    btn.className = 'outcome-btn';
    btn.innerHTML = `<span class="outcome-emoji">${o.emoji}</span><span class="outcome-label">${o.label}</span><span class="outcome-xp">+${o.xp} XP</span>`;
    btn.addEventListener('click', () => handleOutcome(o));
    list.appendChild(btn);
  });
  show('outcome');
}

function handleOutcome(o) {
  const gainedXP = o.xp;
  const log = {
    id: Date.now(),
    at: session.loginAt,
    situation: session.situation,
    coping: session.copingItem,
    copingCat: session.copingCat,
    outcome: o.label,
    xp: session.bonusXP + gainedXP,
  };
  state.totalXP += gainedXP;
  state.logs = [log, ...state.logs].slice(0, 200);
  save(state);
  session.outcomeXP = gainedXP;
  session.outcomeLabel = o.label;
  session.outcomeEmoji = o.emoji;
  renderResult();
}

// ─── RESULT ──────────────────────────────────────────────────
function renderResult() {
  const total = session.bonusXP + session.outcomeXP;
  document.getElementById('res-emoji').textContent = session.outcomeEmoji;
  document.getElementById('res-title').textContent = session.outcomeLabel;
  document.getElementById('res-xp').textContent = '+'+total+' XP 獲得';
  document.getElementById('res-sit').textContent = session.situation;
  document.getElementById('res-cop').textContent = session.copingItem;

  const lv = getLevel(state.totalXP);
  const pct = progress(state.totalXP);
  document.getElementById('res-lv').textContent = 'Lv.'+lv.level;
  document.getElementById('res-lv-title').textContent = lv.title;
  document.getElementById('res-xp-total').textContent = state.totalXP+' XP';
  document.getElementById('res-progress').style.width = pct+'%';
  show('result');
}

document.getElementById('btn-res-home').addEventListener('click', renderHome);

// ─── HISTORY ─────────────────────────────────────────────────
function renderHistory() {
  const list = document.getElementById('hist-list');
  list.innerHTML = '';
  if (state.logs.length === 0) {
    list.innerHTML = '<div style="text-align:center;opacity:0.5;margin-top:40px">記録なし</div>';
  } else {
    state.logs.forEach(log => {
      const el = document.createElement('div');
      el.className = 'log-item';
      el.innerHTML = `
        <div class="log-top">
          <span class="log-date">${fmtDate(log.at)}</span>
          <span class="log-xp">+${log.xp} XP</span>
        </div>
        <div class="log-sit">${log.situation}</div>
        <div class="log-coping">→ ${log.coping}</div>
        <div class="log-outcome">${log.outcome}</div>
      `;
      list.appendChild(el);
    });
  }
  show('history');
}

document.getElementById('btn-hist-back').addEventListener('click', renderHome);

// ─── 初期化 ───────────────────────────────────────────────────
renderHome();
</script>
</body>
</html>
